global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "electroshop"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    honor_labels: true
    static_configs:
      - targets: ["host.docker.internal:8080"]