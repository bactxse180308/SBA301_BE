# ===================================================================
# Spring Boot Configuration for Production Environment
# Profile: prod
# ===================================================================

# Server Configuration
server.port=${PORT:8080}
server.shutdown=graceful
server.tomcat.mbeanregistry.enabled=true

# HTTP Compression (Optimizes bandwidth)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=2048

# Database Configuration (Using Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HikariCP Connection Pool Optimization
spring.datasource.hikari.pool-name=ElectroshopProdPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:10}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# JPA/Hibernate Configuration
# 'validate' prevents accidental schema modification in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis Configuration (Production)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Logging Configuration
# Set root to INFO, disable detailed debug/trace logs
logging.level.root=INFO
logging.level.com.sba302.electroshop=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# SpringDoc / Swagger (Typically disabled or restricted in prod)
springdoc.api-docs.enabled=${ENABLE_SWAGGER:false}
springdoc.swagger-ui.enabled=${ENABLE_SWAGGER:false}

# Actuator Security & Production Setup
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.export.prometheus.enabled=true

# VNPAY Production (Assuming these will be set via Environment Variables)
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.payment-url=https://pay.vnpay.vn/vpcpay.html
vnpay.return-url=${VNPAY_RETURN_URL}

# Cloudflare R2 / S3
r2.endpoint=${R2_ENDPOINT}
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}
r2.bucket-name=${R2_BUCKET_NAME}
r2.public-url=${R2_PUBLIC_URL}
