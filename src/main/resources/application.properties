spring.application.name=electroshop

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=shop_system_electronics1;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Hibernate Batch Config
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration (Disabled - using JPA auto-generation)
spring.flyway.enabled=false

# SpringDoc OpenAPI (Swagger) Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging Configuration
logging.level.root=INFO
logging.level.com.sba302.electroshop=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Admin Account Configuration (Default credentials)
app.admin.email=admin@electroshop.com
app.admin.password=Admin@123456
app.admin.full-name=System Administrator
app.admin.phone=0900000000
app.admin.address=ElectroShop Head Office

# =============================================
# Redis Configuration
# =============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# =============================================
# Email Configuration (SMTP)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =============================================
# OAuth2 Integration
# =============================================
# You must provide the Google Client ID created in Google Cloud Console
app.oauth2.google.client-id=${GOOGLE_CLIENT_ID}
app.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET}
# =============================================
# Spring Boot Actuator & Prometheus Metrics
# =============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

management.metrics.tags.application=${spring.application.name}


management.metrics.distribution.percentiles-histogram[http.server.requests]=true
management.metrics.distribution.percentiles[http.server.requests]=0.5,0.75,0.95,0.99
management.metrics.distribution.slo[http.server.requests]=10ms,50ms,100ms,200ms,500ms
server.tomcat.mbeanregistry.enabled=true

management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.logback=true
management.metrics.enable.hikaricp=true
management.metrics.enable.http=true
management.metrics.enable.jdbc=true


